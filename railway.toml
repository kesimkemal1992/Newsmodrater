# ════════════════════════════════════════════════════════════════
# railway.toml  —  Railway deployment config
# ════════════════════════════════════════════════════════════════

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Persistent volume for session file + SQLite DB
# Set this in Railway dashboard: Mount /data → /app/data
# Then set DB_PATH=/app/data/memory.db and SESSION_NAME=/app/data/manager_session

