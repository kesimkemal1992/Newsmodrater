[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["python311", "pip"]

[build.nixpacksPlan.phases.install]
cmds = [
  "pip install -r requirements.txt --break-system-packages || pip install -r requirements.txt",

  # Step 1: Fix Ubuntu 24.04 (Noble) broken package names BEFORE playwright install
  # libasound2 was renamed to libasound2t64 in Ubuntu 24.04 — this is the crash cause
  "apt-get update -qq",
  "apt-get install -y --no-install-recommends libasound2t64 libgbm1 libnss3 libxss1 libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libdrm2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libglib2.0-0t64 libgtk-3-0t64 libpango-1.0-0 fonts-liberation ca-certificates",

  # Step 2: Install only Chromium binary — skip --with-deps since we installed them above
  "playwright install chromium"
]

[deploy]
startCommand = "python main.py"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
